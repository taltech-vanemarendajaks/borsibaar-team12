name: Build, Push, and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4,

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2,

      
      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=https://team12.serverquake.com/api
          push: true
          tags: ${{ secrets.SERVER_IP }}:5000/borsibaar-team12-frontend:latest,

      
      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.SERVER_IP }}:5000/borsibaar-team12-backend:latest,

      
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: | 
            193.40.157.29 ssh-rsa ,
      
      - name: SSH and restart containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} "
          cd /home/ubuntu/team12/opt/deployer-docker &&
          sudo docker compose -f docker-compose.yaml down &&
          sudo docker compose -f docker-compose.yaml pull --build &&
          sudo docker compose -f docker-compose.yaml up -d"